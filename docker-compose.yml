services:

# ===============================================================
# nginx 
# ===============================================================

    nginx:
      build:
        context: ./docker/nginx
        dockerfile: Dockerfile
      container_name: maildora_nginx
      ports:
        - "80:80"
      depends_on:
        api:
          condition: service_healthy   
        web:
          condition: service_healthy   
      restart: unless-stopped
      networks:
        - maildora_network

# ===============================================================
# WEB
# ===============================================================

    web:
      build:
        context: .
        dockerfile: apps/web/Dockerfile
      container_name: maildora_web
      ports:
        - "3000"
      env_file:
        - apps/web/.env.local
      environment:
        - NEXT_TELEMETRY_DISABLED=1
        - NODE_ENV=development
      depends_on:
        api:
          condition: service_healthy
      restart: unless-stopped
      networks:
        - maildora_network
      healthcheck:
        test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
        interval: 15s
        timeout: 5s
        retries: 5
        start_period: 30s

# ===============================================================
# API 
# ===============================================================

    api:
      build:
        context: .
        dockerfile: apps/api/Dockerfile
      container_name: maildora_api
      ports:
        - "4000"
      env_file:
        - apps/api/.env
      environment:
        - DATABASE_URL=${DATABASE_URL}
        - JWT_SECRET=${JWT_SECRET}
        - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
        - REDIS_HOST=redis
        - REDIS_PORT=6379
        - BREVO_API_KEY=${BREVO_API_KEY}
        - BREVO_WEBHOOK_SECRET=${BREVO_WEBHOOK_SECRET}
        - PORT=4000
        - NODE_ENV=development
      depends_on:
        redis:
          condition: service_healthy
      restart: unless-stopped
      networks:
        - maildora_network
      healthcheck:
        test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 20s 

# ===============================================================
# WORKER
# ===============================================================

    worker:
      build:
        context: .
        dockerfile: apps/worker/Dockerfile
      container_name: maildora_worker
      env_file:
        - apps/api/.env
      environment:
        - REDIS_HOST=redis
        - REDIS_PORT=6379
        - NODE_ENV=production
      depends_on:
        redis:
          condition: service_healthy
        api:
          condition: service_healthy
      restart: unless-stopped
      networks:
        - maildora_network
      deploy:
        resources:
          limits:
            cpus: '0.5'
            memory: 512M

# ===============================================================
# REDIS
# ===============================================================

    redis:
      image: redis:7-alpine
      container_name: maildora_redis
      ports:
        - "6379:6379"
      command: redis-server --appendonly yes
      volumes:
        - redis_data:/data
      restart: unless-stopped
      networks:
        - maildora_network
      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 5

